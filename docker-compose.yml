services:
  backend:
    build: ./backend
    # порт убираем — снаружи не торчит
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "8444:443"  # 443 занят Xray, 8443 занят Yamtrack — берём 8444
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/ssl/cloudflare.pem:/etc/ssl/cloudflare.pem:ro
      - /etc/ssl/cloudflare.key:/etc/ssl/cloudflare.key:ro
    depends_on:
      - backend

volumes:
  postgres_data: