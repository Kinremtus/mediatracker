server {
    listen 443 ssl;
    server_name mediatracker.web-socket-test-bench.site;

    ssl_certificate /etc/ssl/cloudflare.pem;
    ssl_certificate_key /etc/ssl/cloudflare.key;

    root /usr/share/nginx/html;
    index index.html;

    # Проксируем картинки TMDB
    location /tmdb-image/ {
        proxy_pass https://image.tmdb.org/t/p/w500/;
        proxy_ssl_server_name on;
    }

    # Бэкенд эндпоинты
    location /health { proxy_pass http://backend:8000/health; }
    location /auth/ { proxy_pass http://backend:8000/auth/; }
    location /media/ { proxy_pass http://backend:8000/media/; }
    location /tracking/ { proxy_pass http://backend:8000/tracking/; }
    location /search/ { proxy_pass http://backend:8000/search/; }

    # Фронтенд — SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name mediatracker.web-socket-test-bench.site;
    return 301 https://$host$request_uri;
}