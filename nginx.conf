limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_min_length 256;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

server {
    listen 80;
    server_name mediatracker.web-socket-test-bench.site;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    resolver 1.1.1.1 valid=10s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location /tmdb-image/ {
        set $tmdb_upstream image.tmdb.org;
        rewrite ^/tmdb-image/(.*)$ /t/p/w500/$1 break;
        proxy_pass https://$tmdb_upstream;
        proxy_ssl_server_name on;
        proxy_ssl_name image.tmdb.org;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /static/ {
        alias /usr/share/nginx/html/;
        etag on;
        if_modified_since exact;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        set $backend http://app:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;
        proxy_busy_buffers_size 64k;
    }

    location / {
        set $backend http://app:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;
        proxy_busy_buffers_size 64k;
    }
}
