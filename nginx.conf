limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_min_length 256;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

server {
    listen 443 ssl;
    server_name mediatracker.web-socket-test-bench.site;

    ssl_certificate /etc/ssl/cloudflare.pem;
    ssl_certificate_key /etc/ssl/cloudflare.key;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    resolver 127.0.0.11 valid=10s;

    # --- Security headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # --- TMDB images proxy ---
    location /tmdb-image/ {
        set $tmdb_upstream image.tmdb.org;
        rewrite ^/tmdb-image/(.*)$ /t/p/w500/$1 break;
        proxy_pass https://$tmdb_upstream;
        proxy_ssl_server_name on;
        proxy_ssl_name image.tmdb.org;

        # Cache images 7 days
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --- Static files ---
    # nginx already sends ETag and Last-Modified by default — we just tell the
    # browser to revalidate every request via Cache-Control: no-cache instead
    # of caching aggressively for 30 days. This is the standard HTTP cache-bust
    # mechanism: changed file → 200 with new body; unchanged → 304 (cheap).
    location /static/ {
        alias /usr/share/nginx/html/;
        etag on;
        if_modified_since exact;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # --- API rate limiting ---
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        set $backend http://app:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Backend ---
    location / {
        set $backend http://app:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name mediatracker.web-socket-test-bench.site;
    return 301 https://$host$request_uri;
}
