server {
    listen 443 ssl;
    server_name mediatracker.web-socket-test-bench.site;

    ssl_certificate /etc/ssl/cloudflare.pem;
    ssl_certificate_key /etc/ssl/cloudflare.key;

    root /usr/share/nginx/html;
    index index.html;

    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /auth {
        proxy_pass http://backend:8000/auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /media {
        proxy_pass http://backend:8000/media;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /tracking {
        proxy_pass http://backend:8000/tracking;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /search {
        proxy_pass http://backend:8000/search;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

location /tmdb-image/ {
    proxy_pass https://image.tmdb.org/t/p/w500/;
    proxy_ssl_server_name on;
}

server {
    listen 80;
    server_name mediatracker.web-socket-test-bench.site;
    return 301 https://$host$request_uri;
}