server {
    listen 443 ssl;
    server_name mediatracker.web-socket-test-bench.site;

    ssl_certificate /etc/ssl/cloudflare.pem;
    ssl_certificate_key /etc/ssl/cloudflare.key;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Картинки TMDB
    location /tmdb-image/ {
        proxy_pass https://image.tmdb.org/t/p/w500/;
        proxy_ssl_server_name on;
    }

    # Все запросы проксируем на Rust-бэкенд (Askama шаблоны)
    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name mediatracker.web-socket-test-bench.site;
    return 301 https://$host$request_uri;
}
