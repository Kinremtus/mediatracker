server {
    listen 443 ssl;
    server_name mediatracker.web-socket-test-bench.site;

    ssl_certificate /etc/ssl/cloudflare.pem;
    ssl_certificate_key /etc/ssl/cloudflare.key;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    root /usr/share/nginx/html;
    index index.html;

    # Картинки TMDB
    location /tmdb-image/ {
        proxy_pass https://image.tmdb.org/t/p/w500/;
        proxy_ssl_server_name on;
    }

    # Все API эндпоинты через regex
    location ~ ^/(health|auth|media|tracking|search) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Фронтенд — SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name mediatracker.web-socket-test-bench.site;
    return 301 https://$host$request_uri;
}