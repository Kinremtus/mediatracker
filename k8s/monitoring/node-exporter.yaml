apiVersion: apps/v1
kind: DaemonSet
metadata:
  name:  node-exporter-deployment
  namespace: monitoring
  labels:
    app:  node-exporter-server
spec:
  selector:
    matchLabels:
      app:  node-exporter-server
  template:
    metadata:
      labels:
        app:  node-exporter-server
    spec:
      hostNetwork: true
      hostPID: true
      containers:
        - name:  node-exporter
          image: prom/node-exporter
          ports:
            - containerPort: 9100
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: rootfs
              mountPath: /host/root
              readOnly: true
          resources:
            limits:
              memory: "20Mi"
              cpu: "20m"
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: rootfs
          hostPath:
            path: /
