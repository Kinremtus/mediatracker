apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  alerts.yml: |
    groups:
      - name: app
        rules:
          - alert: AppDown
            expr: up{app="app"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "App is down"
          - alert: HighCPU
            expr: rate(process_cpu_seconds_total{app="app"}[5m]) > 0.8
            for: 2m
            labels:
              severity: warning
  prometheus.yml: |
    global:
      scrape_interval: 15s
    rule_files:
      - "/etc/prometheus/alerts.yml"
    scrape_configs:
      - job_name: app
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: app
            action: keep
          - source_labels: [__address__]
            regex: (.+):\d+
            replacement: $1:8080
            target_label: __address__

      - job_name: node-exporter
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: node-exporter
            action: keep