apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: mediatracker
spec:
  replicas: 1
  selector: 
    matchLabels:
      app: mediatracker
  template:
    metadata:
      labels:
        app: mediatracker
    spec:
      containers:
        - name: app
          image: ghcr.io/Kinremtus/mediatracker:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
    volumes:
      - name: tmp
        emptyDir: {}
    securityContext:
      runAsNonRoot: true

