apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ports:
      web:
        port: 80
        hostPort: 30080
      websecure:
        port: 443
        hostPort: 30443
    service:
      spec:
        ports:
          - name: web
            port: 80
            targetPort: web
            nodePort: 30080
          - name: websecure
            port: 443
            targetPort: websecure
            nodePort: 30443