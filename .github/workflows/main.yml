name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 120m
          script: |
            set -euo pipefail
            cd ${{ secrets.TARGET_DIR }}

            # Force-push-safe sync. 'git pull' fails on non-fast-forward
            # (e.g. after a local `git reset --hard` + force-push), but
            # the script continues without `set -e` and silently deploys
            # the old code. Reset to origin/main is idempotent.
            git fetch origin main
            git reset --hard origin/main
            echo "📌 Synced to: $(git rev-parse --short HEAD)"

            # Создаём volumes для кэша Cargo (если ещё нет)
            docker volume create cargo-registry 2>/dev/null || true
            docker volume create cargo-git 2>/dev/null || true

            docker compose down -t 0
            docker rm -f mediatracker-db-1 mediatracker-app-1 mediatracker-nginx-1 2>/dev/null || true
            sleep 3
            DOCKER_BUILDKIT=1 docker compose up --build -d

            echo "⏳ Ждём запуска сервиса..."
            sleep 15

            echo "🔍 Проверяем healthcheck..."
            RESPONSE=$(curl -s http://localhost:8080/health)
            echo "Ответ сервера: $RESPONSE"

            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              echo "✅ Деплой успешен!"
            else
              echo "❌ Healthcheck провалился!"
              echo "=== APP LOGS ==="
              docker compose logs --tail=50 app
              echo "=== NGINX LOGS ==="
              docker compose logs --tail=50 nginx
              exit 1
            fi
