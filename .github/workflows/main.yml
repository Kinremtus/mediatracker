name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 120m
          script: |
            set -euo pipefail
            cd ${{ secrets.TARGET_DIR }}

            # Force-push-safe sync
            git fetch origin main
            git reset --hard origin/main
            echo "📌 Synced to: $(git rev-parse --short HEAD)"

            # Build with layer cache (survives docker system prune -a)
            mkdir -p /tmp/docker-cache-new
            docker buildx create --use --name mediatracker-builder \
              --driver docker-container --bootstrap 2>/dev/null || true
            if [ -f /tmp/docker-cache/index.json ]; then
              CACHE_FROM="--cache-from type=local,src=/tmp/docker-cache"
            else
              CACHE_FROM=""
              echo "⚠️  Cache пуст, полная сборка с нуля"
            fi
            docker buildx build $CACHE_FROM \
              --cache-to type=local,dest=/tmp/docker-cache-new,mode=max \
              -t mediatracker_app:latest \
              --load .

            # Atomic cache swap
            rm -rf /tmp/docker-cache 2>/dev/null; mv /tmp/docker-cache-new /tmp/docker-cache

            docker compose down -t 0
            docker rm -f mediatracker-db-1 mediatracker-app-1 mediatracker-nginx-1 2>/dev/null || true
            sleep 3

            docker compose up -d

            echo "⏳ Ждём запуска сервиса..."
            sleep 15

            echo "🔍 Проверяем healthcheck..."
            RESPONSE=$(curl -s http://localhost:8080/health)
            echo "Ответ сервера: $RESPONSE"

            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              echo "✅ Деплой успешен!"
            else
              echo "❌ Healthcheck провалился!"
              echo "=== APP LOGS ==="
              docker compose logs --tail=50 app
              echo "=== NGINX LOGS ==="
              docker compose logs --tail=50 nginx
              exit 1
            fi
