name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - name: cargo clippy
        run: cargo clippy -- -D warnings
      - name: cargo test
        run: cargo test
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071

  deploy:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 120m
          script: |
            set -euo pipefail
            cd ${{ secrets.TARGET_DIR }}

            git fetch origin main
            git reset --hard origin/main
            echo "📌 Synced to: $(git rev-parse --short HEAD)"

            sudo mkdir -p /tmp/docker-cache-new

            sudo docker buildx create --use --name mediatracker-builder \
              --driver docker-container --bootstrap 2>/dev/null || true

            if [ -f /tmp/docker-cache/index.json ]; then
              CACHE_FROM="--cache-from type=local,src=/tmp/docker-cache"
            else
              CACHE_FROM=""
              echo "⚠️  Cache пуст, полная сборка с нуля"
            fi

            sudo docker buildx build $CACHE_FROM \
              --cache-to type=local,dest=/tmp/docker-cache-new,mode=max \
              -t mediatracker_app:latest \
              --load .

            sudo rm -rf /tmp/docker-cache 2>/dev/null
            sudo mv /tmp/docker-cache-new /tmp/docker-cache

            sudo docker compose down -t 0 || true
            sudo docker compose up -d

            echo "⏳ Ждём запуска сервиса..."
            sleep 15

            echo "🔍 Проверяем healthcheck..."
            RESPONSE=$(curl -s http://localhost:8080/health)
            echo "Ответ сервера: $RESPONSE"

            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              echo "✅ Деплой успешен!"
            else
              echo "❌ Healthcheck провалился!"
              echo "=== APP LOGS ==="
              sudo docker compose logs --tail=50 app
              echo "=== NGINX LOGS ==="
              sudo docker compose logs --tail=50 nginx
              exit 1
            fi
