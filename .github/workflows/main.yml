name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 120m
          script: |
            set -euo pipefail
            cd ${{ secrets.TARGET_DIR }}

            # Force-push-safe sync
            git fetch origin main
            git reset --hard origin/main
            echo "📌 Synced to: $(git rev-parse --short HEAD)"

            # Persistent cargo cache volumes (survive container recreation)
            docker volume create cargo-registry 2>/dev/null || true
            docker volume create cargo-git 2>/dev/null || true

            # BuildKit cache directory on host (survives between runs)
            mkdir -p /tmp/docker-buildkit-cache

            docker compose down -t 0
            docker rm -f mediatracker-db-1 mediatracker-app-1 mediatracker-nginx-1 2>/dev/null || true
            sleep 3

            # Build with BuildKit inline cache (stored on host)
            DOCKER_BUILDKIT=1 docker compose build \
              --build-arg BUILDKIT_INLINE_CACHE=1 \
              --cache-from type=local,src=/tmp/docker-buildkit-cache \
              --cache-to type=local,dest=/tmp/docker-buildkit-cache,mode=max

            docker compose up -d

            echo "⏳ Ждём запуска сервиса..."
            sleep 15

            echo "🔍 Проверяем healthcheck..."
            RESPONSE=$(curl -s http://localhost:8080/health)
            echo "Ответ сервера: $RESPONSE"

            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              echo "✅ Деплой успешен!"
            else
              echo "❌ Healthcheck провалился!"
              echo "=== APP LOGS ==="
              docker compose logs --tail=50 app
              echo "=== NGINX LOGS ==="
              docker compose logs --tail=50 nginx
              exit 1
            fi
