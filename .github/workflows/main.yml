name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 60m
          script: |
            cd ${{ secrets.TARGET_DIR }}
            git pull origin main

            # Создаём volumes для кэша Cargo (если ещё нет)
            docker volume create cargo-registry 2>/dev/null || true
            docker volume create cargo-git 2>/dev/null || true

            docker compose down
            DOCKER_BUILDKIT=1 docker compose up --build -d

            echo "⏳ Ждём запуска сервиса..."
            sleep 15

            echo "🔍 Проверяем healthcheck..."
            RESPONSE=$(curl -s http://localhost:8080/health)
            echo "Ответ сервера: $RESPONSE"

            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              echo "✅ Деплой успешен!"
            else
              echo "❌ Healthcheck провалился!"
              echo "=== APP LOGS ==="
              docker compose logs --tail=50 app
              echo "=== NGINX LOGS ==="
              docker compose logs --tail=50 nginx
              exit 1
            fi
