{% extends "auth_base.html" %}

{% block title %}Вход - MediaTracker{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <h1 class="auth-title">MediaTracker</h1>
    <p class="auth-subtitle">Войди в свой аккаунт</p>
    {% if let Some(error) = error %}
        <div class="auth-error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login" class="auth-form">
        <input type="text" name="username" placeholder="Имя пользователя" class="auth-input" required>
        <input type="password" name="password" placeholder="Пароль" class="auth-input" required>
        <button type="submit" class="auth-submit">Войти</button>
    </form>
    <p class="auth-link">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
</div>
{% endblock %}
