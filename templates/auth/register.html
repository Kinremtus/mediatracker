{% extends "auth_base.html" %}

{% block title %}Регистрация - MediaTracker{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <h1 class="auth-title">MediaTracker</h1>
    <p class="auth-subtitle">Создай свой аккаунт</p>
    {% if let Some(error) = error %}
        <div class="auth-error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/register" class="auth-form">
        <input type="text" name="username" placeholder="Имя пользователя" class="auth-input" required>
        <input type="email" name="email" placeholder="Email" class="auth-input" required>
        <input type="password" name="password" placeholder="Пароль" class="auth-input" required>
        <button type="submit" class="auth-submit">Зарегистрироваться</button>
    </form>
    <p class="auth-link">Уже есть аккаунт? <a href="/login">Войти</a></p>
</div>
{% endblock %}
