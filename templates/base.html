<!DOCTYPE html>
<html lang="ru" class="graphite">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MediaTracker{% endblock %}</title>
    <!-- Themes (must be before main.css) -->
    <link rel="stylesheet" href="/static/css/themes/light.css">
    <link rel="stylesheet" href="/static/css/themes/graphite.css">
    <link rel="stylesheet" href="/static/css/themes/dark.css">
    <!-- Main styles -->
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/animations.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/utilities.css">
    <!-- Libraries -->
    <script defer src="/static/js/htmx.min.js"></script>
    <script defer src="/static/js/app.js"></script>
    <script defer src="/static/js/alpine.min.js"></script>
    <script>
        // Restore theme from localStorage immediately
        (function() {
            var theme = localStorage.getItem('mediatracker-theme');
            if (theme) {
                document.documentElement.className = theme;
            }
        })();
    </script>
</head>
<body>
    {% block body %}{% endblock %}
</body>
</html>
