{% if !entries.is_empty() %}
<div class="tracking-grid" id="tracking-grid">
    {% for entry_with_media in entries %}
    {% include "partials/tracking_card.html" %}
    {% endfor %}
</div>
{% else %}
<div class="empty-state">
    <div class="empty-state-icon"></div>
    <p class="empty-state-text">Список пуст</p>
    <p class="empty-state-sub">Добавьте тайтлы через <a href="/search" style="color: var(--in_progress);">поиск</a></p>
</div>
{% endif %}
